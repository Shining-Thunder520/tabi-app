
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遠征アプリ</title>

    <style>
.hidden{
    display:none;
}

.back-button{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
    cursor:pointer;
}

.packing-item{
    padding:10px 0;
    border-bottom:1px solid #ddd;
}
        body{
    font-family:sans-serif;
    margin:0;
    padding:20px;
    background:#ffffff;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    text-align:center;
}

.button-grid{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
    margin:30px 0;
}

.button{
    background:#c7f0f2;
    border:3px solid #000;
    border-radius:20px;
    padding:15px;
    min-width:120px;
    text-align:center;
    font-weight:bold;
}

.todo{
    margin-top:30px;
}

.todo-item{
    margin:12px 0;
}

.progress{
    font-size:18px;
    font-weight:bold;
}
.add-button{
    margin:15px 0;
    padding:10px;
    border:2px solid #000;
    border-radius:10px;
    display:inline-block;
    cursor:pointer;
}

.tag{
    font-size:14px;
    margin-left:5px;
}
    </style>
    
</head>

<body>

<div class="header">
<div>NEXT ➜</div>
<div>☰</div>
</div>

<div class="title">
<h1>旅のタイトル</h1>
<div>2026/7/1～7/3</div>
<div>あと14日</div>
</div>

<div class="button-grid">

<div class="button" onclick="openPacking()">
持ち物<br>
<span class="progress">15/18</span>
</div>
    
<div class="button">
お土産<br>
<span class="progress">2/3</span>
</div>

<div class="button">
メモ
</div>

<div class="button">
行きたい場所<br>
5件
</div>

<div class="button">
日程表
</div>

<div class="button">
やること
</div>

</div>

<div class="todo">

<h2>やること</h2>

<div class="todo-item">
☐ 宿予約
</div>

<div class="todo-item">
☐ 美容室予約
</div>

<div class="todo-item">
☐ 服決める
</div>

<div class="todo-item">
☐ ネイル
</div>

</div>

 <div id="packingPage" class="hidden">

<div class="back-button" onclick="closePacking()">
← 戻る
</div>

<h1>持ち物</h1>

<div class="add-button" onclick="addPackingItem()">
＋追加
</div>

<div id="packingList"></div>

<hr>

<div>
✈️ 機内持ち込み
</div>

<div>
☁️ 余裕があれば
</div>

</div>

<script>

function openPacking(){
    document.querySelector('.header').style.display='none';
    document.querySelector('.title').style.display='none';
    document.querySelector('.button-grid').style.display='none';
    document.querySelector('.todo').style.display='none';

    document.getElementById('packingPage').classList.remove('hidden');
    renderPacking();
}

function closePacking(){
    document.querySelector('.header').style.display='flex';
    document.querySelector('.title').style.display='block';
    document.querySelector('.button-grid').style.display='flex';
    document.querySelector('.todo').style.display='block';

    document.getElementById('packingPage').classList.add('hidden');
}

    let packingItems = [
    {
        name:"財布",
        carry:false,
        optional:false,
        checked:false
    },
    {
        name:"スマホ",
        carry:true,
        optional:false,
        checked:false
    },
    {
        name:"着替え",
        carry:false,
        optional:true,
        checked:false
    }
];

function savePacking() {
    const items = [];

    document.querySelectorAll("#packingList .packing-item").forEach(item => {
        const checkbox = item.querySelector("input");
        const text = item.textContent.trim();

        items.push({
            name: text,
            checked: checkbox.checked
        });
    });

    localStorage.setItem("packingList", JSON.stringify(items));
}

function loadPacking() {
    const data = JSON.parse(localStorage.getItem("packingList")) || [];

    const list = document.getElementById("packingList");
    list.innerHTML = "";

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "packing-item";

        div.innerHTML = `
            <label>
                <input type="checkbox" ${item.checked ? "checked" : ""}>
                ${item.name}
            </label>
        `;

        div.querySelector("input").addEventListener("change", savePacking);

        list.appendChild(div);
    });
}
    
function renderPacking(){

    const list =
        document.getElementById("packingList");

    list.innerHTML = "";

  packingItems.forEach((item,index)=>{

        let tags = "";

        if(item.carry){
            tags += " ✈️";
        }

        if(item.optional){
            tags += " ☁️";
        }

       const mark =
    item.checked ? "☑" : "☐";

list.innerHTML += `
<div class="packing-item"
onclick="togglePacking(${index})">
    ${mark} ${item.name}${tags}
</div>
`;
    });
}

function addPackingItem() {
    const name = prompt("持ち物を入力してください");

    if (!name) return;

    const list = document.getElementById("packingList");

    const item = document.createElement("div");
    item.className = "packing-item";

    item.innerHTML = `
        <label>
            <input type="checkbox">
            ${name}
        </label>
    `;

    list.appendChild(item);

    savePacking();
}
    
function togglePacking(index){

    packingItems[index].checked =
        !packingItems[index].checked;

    savePacking();

    renderPacking();
}

function savePacking(){

    localStorage.setItem(
        "packingItems",
        JSON.stringify(packingItems)
    );
}

function loadPacking(){

    const saved =
        localStorage.getItem(
            "packingItems"
        );

    if(saved){
        packingItems =
            JSON.parse(saved);
    }
}

loadPacking();
</script>
    
</body>
</html>
